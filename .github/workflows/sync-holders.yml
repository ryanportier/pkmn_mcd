name: Sync Holders

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos, gratis en GitHub Actions
  workflow_dispatch:          # lanzar manualmente desde GitHub → Actions → Run workflow

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync holders
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/holders/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          BODY=$(cat /tmp/response.json)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Sync OK — $BODY"
          else
            echo "❌ Sync failed (HTTP $STATUS) — $BODY"
            exit 1
          fi
